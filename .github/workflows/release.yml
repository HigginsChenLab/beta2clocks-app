name: Release

# Build native installers for every OS in parallel and publish them to a
# GitHub Release. Trigger by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# or run manually from the Actions tab (workflow_dispatch).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14 # Apple Silicon (M-series)
            args: "--target aarch64-apple-darwin --bundles app,dmg"
          - platform: macos-13 # Intel Mac
            args: "--target x86_64-apple-darwin --bundles app,dmg"
          - platform: ubuntu-22.04 # Linux
            args: "--bundles deb,appimage"
          - platform: windows-latest # Windows
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ---------------------------------------------------------------
          # macOS signing + notarization. These are OPTIONAL: when the
          # secrets are unset the macOS build is ad-hoc signed (users run
          # `xattr -dr com.apple.quarantine` once). Set them in the repo's
          # Settings → Secrets to produce signed, notarized builds that open
          # with no warning. See README "Releasing".
          # ---------------------------------------------------------------
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
          releaseName: "beta2clocks ${{ github.ref_type == 'tag' && github.ref_name || format('build {0}', github.run_number) }}"
          releaseBody: |
            Desktop app for calculating epigenetic clocks (TranslAGE / methylCIPHER).

            **Requires [Docker Desktop](https://www.docker.com/products/docker-desktop/).** On first launch the app downloads the clock engine once.

            Download the installer for your platform below.

            macOS (unsigned builds): after dragging to Applications, run once in Terminal:
            `xattr -dr com.apple.quarantine /Applications/beta2clocks.app`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
